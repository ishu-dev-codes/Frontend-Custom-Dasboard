<div class="dashboard-header" *ngIf="authService.authState$ | async">
  <div class="header-logo">
    @if (logoUrl) {
      <img [src]="logoUrl" alt="Client Logo" class="logo-img" />
    } @else {
      <div class="logo-placeholder">
        <img src="svgs/custom.svg"/>
      </div>
    }
  </div>

  <div class="dashborad-header-text">
    <h3>RAPIDConvert Dashboard</h3>
  </div>

  @if (showClientAccounts) {
    <nav class="header-nav">
      <a class="header-nav-link" [class.active]="router.url === '/client-accounts'" (click)="router.navigate(['/client-accounts'])">
        <i class="pi pi-users"></i> Client Accounts
      </a>
    </nav>
  }


  <div class="header-controls">
    @if (!showClientAccounts) {
      <div class="control-group">
        <label class="control-label">Date Range</label>
        <div class="datepicker-go-row">
          <p-datepicker
            [(ngModel)]="calendarDateRange"
            selectionMode="range"
            dateFormat="mm/dd/yy"
            placeholder="Select date range"
            class="header-datepicker"
            (onSelect)="onCalendarDateChange()"
          />
          @if (showGoButton) {
            <button class="go-btn" (click)="onGoClick()">Go</button>
          }
        </div>
      </div>

      <div class="control-group">
        <label class="control-label">Preset</label>
        <p-select
          [options]="datePresets"
          [(ngModel)]="selectedPreset"
          optionLabel="label"
          optionValue="value"
          class="header-select"
          (onChange)="onPresetChange($event)"
        />
      </div>
    }

    <div class="profile-menu-wrapper">
      <button class="profile-btn" (click)="toggleProfileMenu()" [class.active]="profileMenuOpen">
        <i class="pi pi-user"></i>
      </button>
      @if (profileMenuOpen) {
        <div class="profile-dropdown">
          <button class="profile-dropdown-item logout-item" (click)="logout()">
            <i class="pi pi-sign-out"></i>
            <span>Logout</span>
          </button>
        </div>
      }
    </div>
  </div>
</div>
