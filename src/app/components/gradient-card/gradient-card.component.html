<div class="card-host">
  <p-card  class="gradient-card">
    <div class="card-title">{{ data.title }}</div>
    <div class="card-value">{{ data.value }}</div>
    @if (data.innerBox) {
      <div class="inner-box" [style.color]="data.innerBox.color">
        <div class="inner-box-label">{{ data.innerBox.label }}</div>
        <div class="inner-box-value">{{ data.innerBox.value }} %</div>
      </div>
    }
  </p-card>

  @if (data.info) {
    <button class="info-btn" (click)="toggleInfo($event)" title="What is this metric?">
      <i class="pi pi-info-circle"></i>
    </button>
    @if (showInfo) {
      <div class="info-popup">{{ data.info }}</div>
    }
  }

  @if (data.clickable !== false) {
    <button class="details-btn" (click)="$event.stopPropagation(); cardClick.emit()" title="View details">
      <i class="pi pi-ellipsis-h"></i>
    </button>
  }
</div>
